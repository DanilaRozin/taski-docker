# Файл docker-compose.yml
volumes:
  pg_data:
  # Новый volume — для статических файлов
  static:

services:
  db:
    image: postgres:latest
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    image: danilarozin/taski_backend
    env_file: .env
    # Тут подключаем volume к backend
    volumes:
      - static:/backend_static
  frontend:
    env_file: .env
    image: danilarozin/taski_frontend
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static
  gateway:
    image: danilarozin/taski_gateway
    env_file: .env
    # А тут подключаем volume со статикой к gateway
    volumes:
      - static:/staticfiles
    ports:
      - 8000:80